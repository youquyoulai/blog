baseURL = 'https://pgkb.pgoj.top/'
languageCode = 'zh-cn'
defaultContentLanguage = 'zh'
title = '平哥集录'
theme = 'weisaygrace'

hasCJKLanguage = true
buildFuture = true
mainSections = ['math', 'literature', 'history', 'philosophy', 'science', 'life']
capitalizeListTitles = false

[pagination]
  pagerSize = 10

[params]
  author = '平哥'
  description = '平哥集录 — 数学、文学、历史、哲学、科学与生活的笔记与思考'
  keywords = '数学,文学,历史,哲学,科学,生活,知识库,高考数学,题解'
  logo = '平哥集录'
  builtYear = '2026'
  email = 'wuliwuju@126.com'
  favicon = '/favicon.ico'
  imageCDN = 'https://img.pgoj.top'

  # Waline 评论配置
  [params.waline]
  serverURL = 'https://waline.pgoj.top'

[permalinks]
  math = '/archives/:slug.html'
  posts = '/archives/:slug.html'
  literature = '/:sections/:slug.html'
  history = '/:sections/:slug.html'
  philosophy = '/:sections/:slug.html'
  science = '/:sections/:slug.html'
  life = '/:sections/:slug.html'

[taxonomies]
  tag = 'tags'
  category = 'categories'

[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']
  term = ['HTML', 'RSS']
  page = ['HTML']

[outputFormats.JSON]
  mediatype = "application/json"
  baseName = "searchindex"
  isPlainText = true
  notAlternative = true

[services.rss]
  limit = 20

[outputFormats.RSS]
  mediatype = "application/rss+xml"
  baseName = "feed"

[sitemap]
  changefreq = 'weekly'
  priority = 0.5
  filename = 'sitemap.xml'

[minify]
  minifyOutput = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepComments = false
      keepWhitespace = false

[imaging]
  resampleFilter = "Lanczos"
  quality = 82
  anchor = "Smart"

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
