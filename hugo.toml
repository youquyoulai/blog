baseURL = 'https://www.pgoj.top/'
languageCode = 'zh-cn'
defaultContentLanguage = 'zh'
title = '平哥偶记'
theme = 'xlxn'

hasCJKLanguage = true
[pagination]
  pagerSize = 5
mainSections = ['posts']
capitalizeListTitles = false

[params]
  author = '平哥'
  description = '记录日常观感，分享生活随笔'
  keywords = '博客,随笔,观感,教育,文艺,阅读'
  logo = '平哥偶记'
  builtYear = '2021'

  # Giscus 评论配置
  [params.giscus]
  repo = 'youquyoulai/blog'
  repoId = 'R_kgDOSKS49Q'
  category = 'Announcements'
  categoryId = 'DIC_kwDOSKS49c4C7g9k'
  mapping = 'pathname'

[taxonomies]
  tag = 'tags'
  category = 'categories'

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']
  term = ['HTML', 'RSS']

[services.rss]
  limit = 20

[outputFormats.RSS]
  mediatype = "application/rss+xml"
  baseName = "feed"

[sitemap]
  changefreq = 'weekly'
  priority = 0.5
  filename = 'sitemap.xml'

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
