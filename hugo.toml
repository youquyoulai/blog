baseURL = 'https://math.pgoj.top/'
languageCode = 'zh-cn'
defaultContentLanguage = 'zh'
title = '平哥解数学'
theme = 'weisaygrace'

hasCJKLanguage = true
buildFuture = true
mainSections = ['math']
capitalizeListTitles = false

[pagination]
  pagerSize = 10

[params]
  author = '平哥'
  description = '数学题目解析与题解收藏，分享解题思路与方法'
  keywords = '数学,题解,高考数学,模拟题,解析'
  logo = '平哥解数学'
  builtYear = '2026'
  email = 'wuliwuju@126.com'
  favicon = '/favicon.ico'
  imageCDN = 'https://img.pgoj.top'

  # Twikoo 评论配置 (已停用)
  #[params.twikoo]
  #envId = 'https://twikoo.pgoj.top'

  # Waline 评论配置
  [params.waline]
  serverURL = 'https://waline.pgoj.top'

[permalinks]
  math = '/archives/:slug.html'
  posts = '/archives/:slug.html'

[taxonomies]
  tag = 'tags'
  category = 'categories'

[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']
  term = ['HTML', 'RSS']
  page = ['HTML']

[outputFormats.JSON]
  mediatype = "application/json"
  baseName = "searchindex"
  isPlainText = true
  notAlternative = true

[services.rss]
  limit = 20

[outputFormats.RSS]
  mediatype = "application/rss+xml"
  baseName = "feed"

[sitemap]
  changefreq = 'weekly'
  priority = 0.5
  filename = 'sitemap.xml'

[minify]
  minifyOutput = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepComments = false
      keepWhitespace = false

[imaging]
  resampleFilter = "Lanczos"
  quality = 82
  anchor = "Smart"

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
