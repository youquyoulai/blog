baseURL = 'https://www.pgoj.top/'
languageCode = 'zh-cn'
defaultContentLanguage = 'zh'
title = '平哥偶记'
theme = 'xlxn'

hasCJKLanguage = true
mainSections = ['posts']
capitalizeListTitles = false

[pagination]
  pagerSize = 7

[params]
  author = '平哥'
  description = '记录日常观感，分享生活随笔'
  keywords = '博客,随笔,观感,教育,文艺,阅读'
  logo = '平哥偶记'
  builtYear = '2021'

  # Twikoo 评论配置 (已停用)
  #[params.twikoo]
  #envId = 'https://twikoo.pgoj.top'

  # Waline 评论配置
  [params.waline]
  serverURL = 'https://waline.pgoj.top'

[permalinks]
  posts = '/archives/:slug.html'

[taxonomies]
  tag = 'tags'
  category = 'categories'

[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']
  term = ['HTML', 'RSS']

[outputFormats.JSON]
  mediatype = "application/json"
  baseName = "searchindex"
  isPlainText = true
  notAlternative = true

[services.rss]
  limit = 20

[outputFormats.RSS]
  mediatype = "application/rss+xml"
  baseName = "feed"

[sitemap]
  changefreq = 'weekly'
  priority = 0.5
  filename = 'sitemap.xml'

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
