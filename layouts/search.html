{{ define "main" }}
<style>
.search-results-page{padding:1rem 0;}
.search-results-header{display:flex;align-items:center;gap:0.5rem;margin-bottom:1.5rem;}
.search-results-header form{display:flex;align-items:center;flex:1;max-width:600px;border:1px solid #d8dae2;border-radius:0.5rem;background:#fff;overflow:hidden;}
.search-results-header input{flex:1;border:none;padding:0.75rem 1rem;font-size:1rem;outline:none;background:transparent;}
.search-results-header button{border:none;background:#707377;color:#fff;padding:0.75rem 1rem;cursor:pointer;font-size:1rem;}
.search-results-header button:hover{background:#5a5d62;}
.search-count{margin-bottom:1rem;color:#666;font-size:0.875rem;}

/* 搜索结果：与首页 .post-card 样式对齐 */
.search-card{display:grid;grid-template-columns:1fr;gap:1rem;}
.search-card .post{background:#fff;border-radius:0.375rem;border-bottom:3px solid #e5e5e5;padding:0;display:flex;flex-direction:column;margin-bottom:0;box-shadow:0 0 4px rgba(205,220,230,.5);position:relative;transition:box-shadow .3s;}
.search-card .post:hover{box-shadow:0 2px 12px rgba(205,220,230,.8);}
.search-card .post-thumbnail{position:relative;overflow:hidden;width:100%;aspect-ratio:1.4/1;border-radius:0.375rem 0.375rem 0 0;}
.search-card .post-thumbnail img{width:100%;height:100%;object-fit:cover;display:block;transition:all .3s ease-out 0s;}
.search-card .post-thumbnail img:hover{transform:scale(1.05);}
.search-card .card-item{padding:0.75rem 1rem;display:flex;flex-direction:column;flex-grow:1;}
.search-card .post-title{font-size:1.25rem;flex-grow:1;padding:0.25rem 0;line-height:1.8rem;}
.search-card .post-title a{color:#333;text-decoration:none;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;}
.search-card .post-title a:hover{color:var(--color_hover);}
.search-card .post-content{overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;padding:0;}
.search-card .post-content p{color:#555;line-height:2rem;font-size:0.95rem;word-wrap:break-word;word-break:break-all;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;}
.search-card .post-content p:nth-child(n+2){display:none;}
.search-card .post-meta{font-size:0.785rem;color:#777;margin-top:0.5rem;overflow:hidden;height:1.5rem;line-height:1.5rem;}
.search-card .post-meta span{margin-right:0.3rem;}
.search-card .post-meta .fn::after,.search-card .post-meta .views::before{content:"/";padding:0 0.325rem;}
.search-card mark{background:#ffeb3b;padding:0 0.125rem;border-radius:0.125rem;}

/* 始终单列，自适应宽度 */
.search-card .post{width:100%;}
.search-card .post.no-thumb .card-item{padding:1rem;}
.search-card .post.no-thumb .post-title{font-size:1.125rem;}

.search-empty,.search-loading{color:#666;text-align:center;padding:2rem 0;font-size:1rem;}

@media(max-width:991px){
  .search-card .post,.search-card .type-page{margin-bottom:0;}
  .search-results-header form{max-width:none;}
  .search-card .post-title{font-size:1rem;}
}

/* 暗色模式 */
[data-theme="dark"] .search-results-header form{background:#2a2a2a;border-color:#444;}
[data-theme="dark"] .search-results-header input{color:#ddd;}
[data-theme="dark"] .search-card .post{background:#2a2a2a;border-bottom-color:#444;box-shadow:0 0 4px rgba(0,0,0,.3);}
[data-theme="dark"] .search-card .post-title a{color:#ddd;}
[data-theme="dark"] .search-card .post-content p{color:#aaa;}
[data-theme="dark"] .search-card .post-meta{color:#999;}
</style>
<div class="container">
  <div class="main-content">
    <div class="breadcrumbs">
      <a href="{{ .Site.BaseURL }}">首页</a> &gt; <span>搜索</span>
    </div>
    <div class="search-results-page">
      <h1 class="page-title">搜索结果</h1>
      <div class="search-results-header">
        <form method="get" action="/search" class="search-form" role="search">
          <input type="text" id="searchPageInput" name="s" placeholder="输入搜索关键词..." value="{{ with .Params.s }}{{ . }}{{ end }}">
          <button type="submit">搜索</button>
        </form>
      </div>
      <div id="searchResults" class="search-results-list">
        <p class="search-loading">搜索中...</p>
      </div>
    </div>
  </div>
</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var query = (params.get('s') || '').trim();
  var container = document.getElementById('searchResults');

  if (!query) {
    container.innerHTML = '<p class="search-empty">请输入搜索关键词</p>';
    return;
  }

  function toArray(val) {
    if (Array.isArray(val)) return val;
    if (typeof val === 'string' && val.trim()) return [val.trim()];
    return [];
  }

  var jsonUrl = '{{ "searchindex.json" | relURL }}';
  fetch(jsonUrl)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      var results = [];
      var q = query.toLowerCase();
      for (var i = 0; i < data.length; i++) {
        var post = data[i];
        var tags = toArray(post.tags);
        var categories = toArray(post.categories);
        var text = (post.title + ' ' + post.summary + ' ' + tags.join(' ') + ' ' + categories.join(' ')).toLowerCase();
        if (text.indexOf(q) !== -1) {
          results.push(post);
        }
      }

      if (results.length === 0) {
        container.innerHTML = '<p class="search-empty">没有找到与 "' + escapeHtml(query) + '" 相关的文章</p>';
        return;
      }

      var html = '<p class="search-count">找到 ' + results.length + ' 篇相关文章</p><div class="search-card">';
      for (var j = 0; j < results.length; j++) {
        var r = results[j];
        var catArray = toArray(r.categories);
        var hasThumb = r.thumbnail && r.thumbnail.length > 0;
        html += '<div class="post' + (hasThumb ? '' : ' no-thumb') + '">';
        if (hasThumb) {
          html += '<div class="post-thumbnail"><img src="' + escapeHtml(r.thumbnail) + '" alt="' + escapeHtml(r.title) + '" loading="lazy"></div>';
        }
        html += '<div class="card-item">';
        html += '<h2 class="post-title"><a href="' + escapeHtml(r.url) + '">' + highlight(r.title, query) + '</a></h2>';
        if (r.summary) {
          html += '<div class="post-content"><p>' + highlight(truncate(r.summary, 150), query) + '</p></div>';
        }
        html += '<div class="post-meta"><span>' + (catArray.join(', ') || '未分类') + '</span><span>' + (r.date || '') + '</span></div>';
        html += '</div></div>';
      }
      html += '</div>';
      container.innerHTML = html;
    })
    .catch(function(err) {
      console.error('搜索失败:', err);
      container.innerHTML = '<p class="search-empty">搜索失败，请稍后重试</p>';
    });

  function truncate(str, len) {
    var plain = str.replace(/<[^>]*>/g, '');
    return plain.length > len ? plain.substring(0, len) + '...' : plain;
  }

  function highlight(text, q) {
    if (!q) return text;
    var regex = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return text.replace(regex, '<mark>$1</mark>');
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }
})();
</script>
{{ end }}
