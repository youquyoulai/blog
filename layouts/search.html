{{ define "main" }}
<style>
.search-results-page{padding:1rem 0;}
.search-card{width:100%;}

.search-breadcrumb{background:#fff;border:1px solid #E8E4DD;border-radius:8px;padding:.625rem .875rem;margin-bottom:1rem;font-size:.875rem;font-family:'Noto Serif SC',serif;}
.search-breadcrumb ol{list-style:none;padding:0;margin:0;display:flex;flex-wrap:wrap;align-items:center;gap:.5rem;}
.search-breadcrumb li{display:inline-flex;align-items:center;}
.search-breadcrumb li:not(:last-child)::after{content:'→';margin-left:.5rem;color:#AB9F96;}
.search-breadcrumb a{color:#C04B3D;text-decoration:none;}
.search-breadcrumb a:hover{text-decoration:underline;}
.search-breadcrumb span{color:#3E3A39;}

.search-results-header{display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;}
.search-results-header form{display:flex;align-items:center;flex:1;max-width:600px;border:1px solid #E8E4DD;border-radius:8px;background:#fff;overflow:hidden;}
.search-results-header input{flex:1;border:none;padding:0.75rem 1rem;font-size:1rem;outline:none;background:transparent;color:#3E3A39;font-family:'Noto Serif SC',serif;}
.search-results-header button{border:none;background:#3E3A39;color:#FBF7F0;padding:0.75rem 1rem;cursor:pointer;font-size:1rem;font-family:'Noto Serif SC',serif;}
.search-results-header button:hover{background:#5E5855;}

.search-count-card{display:block;color:#8B837B;font-size:.875rem;margin:0 0 1rem 0;padding:.625rem .875rem;background:#fff;border:1px solid #E8E4DD;border-radius:8px;font-family:'Noto Serif SC',serif;}
.search-count-card span{color:#3E3A39;font-weight:600;}

.search-card .post{background:#fff;border:1px solid #E8E4DD;border-radius:8px;padding:0;display:flex;flex-direction:column;margin-bottom:1rem;transition:box-shadow .2s;width:100%;}
.search-card .post:hover{box-shadow:0 4px 16px rgba(62,58,57,.06);}
.search-card .post-thumbnail{position:relative;overflow:hidden;width:100%;aspect-ratio:1.4/1;border-radius:8px 8px 0 0;}
.search-card .post-thumbnail img{width:100%;height:100%;object-fit:cover;display:block;}
.search-card .card-item{padding:0.75rem 1rem;display:flex;flex-direction:column;flex-grow:1;}
.search-card .post-title{font-size:1.125rem;flex-grow:1;padding:0.25rem 0;line-height:1.8rem;font-family:'Noto Serif SC',serif;font-weight:600;}
.search-card .post-title a{color:#3E3A39;text-decoration:none;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;}
.search-card .post-title a:hover{color:#C04B3D;}
.search-card .post-content{overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;padding:0;}
.search-card .post-content p{color:#555;line-height:1.8rem;font-size:0.95rem;word-wrap:break-word;word-break:break-all;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;}
.search-card .post-content p:nth-child(n+2){display:none;}
.search-card .post-meta{font-size:0.785rem;color:#AB9F96;margin-top:0.5rem;overflow:hidden;height:1.5rem;line-height:1.5rem;font-family:'Noto Serif SC',serif;}
.search-card mark{background:#FFF3CD;color:#3E3A39;padding:0 0.125rem;border-radius:2px;}

.search-card .post.no-thumb .card-item{padding:1rem;}

.search-empty,.search-loading{color:#8B837B;text-align:center;padding:2rem 0;font-size:1rem;font-family:'Noto Serif SC',serif;}

@media(max-width:991px){
  .search-card .post,.search-card .type-page{margin-bottom:1rem;}
  .search-results-header form{max-width:none;}
  .search-card .post-title{font-size:1rem;}
}

.dark .search-breadcrumb{background:#211b1a;border-color:#4a3f3e;}
.dark .search-breadcrumb a{color:#d49590;}
.dark .search-breadcrumb span{color:#e8e4dd;}
.dark .search-breadcrumb li:not(:last-child)::after{color:#76706b;}
.dark .search-results-header form{background:#211b1a;border-color:#4a3f3e;}
.dark .search-results-header input{color:#e8e4dd;}
.dark .search-results-header button{background:#2c2625;color:#e8e4dd;}
.dark .search-results-header button:hover{background:#3a3332;}
.dark .search-count-card{background:#211b1a;border-color:#4a3f3e;color:#76706b;}
.dark .search-count-card span{color:#e8e4dd;}
.dark .search-card .post{background:#211b1a;border-color:#4a3f3e;}
.dark .search-card .post-title a{color:#e8e4dd;}
.dark .search-card .post-title a:hover{color:#e8b5b0;}
.dark .search-card .post-content p{color:#8a847f;}
.dark .search-card .post-meta{color:#76706b;}
.dark .search-card mark{background:#4a3f3e;color:#e8e4dd;}
.dark .search-empty,.dark .search-loading{color:#76706b;}
</style>
<div class="container">
  <div class="main-content">
    <nav class="search-breadcrumb" aria-label="breadcrumb">
      <ol>
        <li><a href="{{ .Site.BaseURL }}">平哥集录</a></li>
        <li><span>搜索</span></li>
      </ol>
    </nav>
    <div class="search-results-page">
      <div id="searchResults" class="search-results-list">
        <p class="search-loading">搜索中...</p>
      </div>
    </div>
  </div>
</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var query = (params.get('s') || '').trim();
  var container = document.getElementById('searchResults');

  if (!query) {
    container.innerHTML = '<p class="search-empty">请输入搜索关键词</p>';
    return;
  }

  function toArray(val) {
    if (Array.isArray(val)) return val;
    if (typeof val === 'string' && val.trim()) return [val.trim()];
    return [];
  }

  var jsonUrl = '{{ "searchindex.json" | relURL }}';
  fetch(jsonUrl)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      var results = [];
      var q = query.toLowerCase();
      for (var i = 0; i < data.length; i++) {
        var post = data[i];
        var tags = toArray(post.tags);
        var categories = toArray(post.categories);
        var text = (post.title + ' ' + post.summary + ' ' + tags.join(' ') + ' ' + categories.join(' ')).toLowerCase();
        if (text.indexOf(q) !== -1) {
          results.push(post);
        }
      }

      if (results.length === 0) {
        container.innerHTML = '<p class="search-empty">没有找到与 "' + escapeHtml(query) + '" 相关的文章</p>';
        return;
      }

      var html = '<div class="search-count-card"><span>找到 ' + results.length + ' 篇相关文章</span></div><div class="search-card">';
      for (var j = 0; j < results.length; j++) {
        var r = results[j];
        var catArray = toArray(r.categories);
        var hasThumb = r.thumbnail && r.thumbnail.length > 0;
        html += '<div class="post' + (hasThumb ? '' : ' no-thumb') + '">';
        if (hasThumb) {
          html += '<div class="post-thumbnail"><img src="' + escapeHtml(r.thumbnail) + '" alt="' + escapeHtml(r.title) + '" loading="lazy"></div>';
        }
        html += '<div class="card-item">';
        html += '<h2 class="post-title"><a href="' + escapeHtml(r.url) + '">' + highlight(r.title, query) + '</a></h2>';
        if (r.summary) {
          html += '<div class="post-content"><p>' + highlight(truncate(r.summary, 150), query) + '</p></div>';
        }
        html += '<div class="post-meta"><span>' + (catArray.join(', ') || '未分类') + '</span><span>' + (r.date || '') + '</span></div>';
        html += '</div></div>';
      }
      html += '</div>';
      container.innerHTML = html;
    })
    .catch(function(err) {
      console.error('搜索失败:', err);
      container.innerHTML = '<p class="search-empty">搜索失败，请稍后重试</p>';
    });

  function truncate(str, len) {
    var plain = str.replace(/<[^>]*>/g, '');
    return plain.length > len ? plain.substring(0, len) + '...' : plain;
  }

  function highlight(text, q) {
    if (!q) return text;
    var regex = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return text.replace(regex, '<mark>$1</mark>');
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }
})();
</script>
{{ end }}
