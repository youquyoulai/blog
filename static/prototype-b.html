<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案B - 经典文档站风格</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #fff; color: #333; }
        .layout { display: flex; height: 100vh; }
        .sidebar { width: 280px; background: #fafafa; border-right: 1px solid #e5e5e5; display: flex; flex-direction: column; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid #e5e5e5; }
        .site-title { font-size: 1.25rem; font-weight: 600; color: #333; }
        .sidebar-search { margin-top: 1rem; padding: 0.5rem 0.75rem; border: 1px solid #ddd; border-radius: 6px; width: 100%; font-size: 0.9rem; background: #fff; }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
        .nav-item { padding: 0.5rem 1.5rem; cursor: pointer; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem; color: #555; }
        .nav-item:hover { background: #f0f0f0; }
        .nav-item.active { background: #fff; color: #ed5565; font-weight: 500; }
        .nav-item.category { font-weight: 600; padding-top: 0.75rem; padding-bottom: 0.75rem; color: #333; }
        .nav-item.subsection { padding-left: 2.5rem; color: #666; font-size: 0.9rem; }
        .nav-item.article { padding-left: 3.5rem; color: #888; font-size: 0.85rem; }
        .nav-icon { width: 16px; text-align: center; }
        .main-content { flex: 1; overflow-y: auto; }
        .content-header { padding: 1.5rem 2rem; border-bottom: 1px solid #e5e5e5; }
        .breadcrumbs { font-size: 0.85rem; color: #666; margin-bottom: 0.5rem; }
        .breadcrumbs a { color: #ed5565; text-decoration: none; }
        .page-title { font-size: 1.75rem; font-weight: 600; }
        .content-body { padding: 2rem; max-width: 800px; line-height: 1.8; }
        .section-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .section-card { background: #f8f8f8; border-radius: 8px; padding: 1.25rem; cursor: pointer; transition: all 0.2s; }
        .section-card:hover { background: #f0f0f0; }
        .section-title { font-weight: 600; margin-bottom: 0.5rem; }
        .section-meta { font-size: 0.85rem; color: #666; }
        .article-list { margin-top: 1rem; }
        .article-item { padding: 0.75rem 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; align-items: center; }
        .article-item:last-child { border-bottom: none; }
        .article-title { font-size: 0.95rem; color: #333; text-decoration: none; }
        .article-title:hover { color: #ed5565; }
        .article-date { font-size: 0.8rem; color: #999; }
        .footer { padding: 1rem 2rem; border-top: 1px solid #e5e5e5; font-size: 0.85rem; color: #999; text-align: center; }
    </style>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="site-title">平哥集录</div>
                <input type="text" class="sidebar-search" placeholder="搜索...">
            </div>
            <div class="sidebar-nav">
                <div class="nav-item category">📐 数学</div>
                <div class="nav-item subsection">2026高考真题</div>
                <div class="nav-item article">导数及其应用</div>
                <div class="nav-item article">概率统计</div>
                <div class="nav-item subsection">题型解析</div>
                <div class="nav-item article">函数单调性判断</div>
                <div class="nav-item subsection">教学随笔</div>
                <div class="nav-item category">📚 文学</div>
                <div class="nav-item subsection">名著导读</div>
                <div class="nav-item article">红楼梦赏析</div>
                <div class="nav-item article">围城解读</div>
                <div class="nav-item category">💭 哲学</div>
                <div class="nav-item category">🔬 杂录</div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="content-header">
                <div class="breadcrumbs">首页 > <a href="#">数学</a></div>
                <div class="page-title">数学</div>
            </div>
            <div class="content-body">
                <p style="color:#666;margin-bottom:1.5rem;">高中数学题解、试题评析与教学思考，共 26 篇文章</p>
                <div class="section-list">
                    <div class="section-card">
                        <div class="section-title">2026高考真题</div>
                        <div class="section-meta">7 篇文章 · 最后更新 2026-07-01</div>
                    </div>
                    <div class="section-card">
                        <div class="section-title">题型解析</div>
                        <div class="section-meta">5 篇文章 · 最后更新 2026-06-15</div>
                    </div>
                    <div class="section-card">
                        <div class="section-title">教学随笔</div>
                        <div class="section-meta">3 篇文章 · 最后更新 2026-06-10</div>
                    </div>
                    <div class="section-card">
                        <div class="section-title">模拟试题</div>
                        <div class="section-meta">4 篇文章 · 最后更新 2026-05-28</div>
                    </div>
                </div>
            </div>
            <div class="footer">
                © 2026 平哥集录 · Powered by Hugo
            </div>
        </div>
    </div>
</body>
</html>
