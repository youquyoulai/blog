<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案一 - 文渊阁 古典书斋风</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: #FBF7F0; color: #3E3A39; }
        .serif { font-family: 'Noto Serif SC', serif; }
        .container { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; }
        .header { text-align: center; margin-bottom: 3rem; }
        .site-title { font-family: 'Noto Serif SC', serif; font-size: 2.5rem; font-weight: 700; letter-spacing: 0.3em; color: #3E3A39; margin-bottom: 1rem; }
        .site-subtitle { font-size: 0.95rem; color: #8B837B; letter-spacing: 0.2em; }
        .divider { width: 100px; height: 1px; background: #C04B3D; margin: 2rem auto; }
        .catalog-section { text-align: center; }
        .catalog-title { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; color: #6B6560; letter-spacing: 0.3em; margin-bottom: 2rem; }
        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        .category-card { background: #fff; border: 1px solid #E8E4DD; border-radius: 8px; padding: 1.5rem; display: flex; flex-direction: column; transition: all 0.2s; cursor: pointer; }
        .category-card:hover { box-shadow: 0 4px 16px rgba(62, 58, 57, 0.08); transform: translateY(-2px); }
        .card-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; }
        .category-seal { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; font-weight: 700; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; border: 2px solid currentColor; border-radius: 4px; flex-shrink: 0; }
        .category-seal svg { width: 32px; height: 32px; }
        .seal-math { color: #C04B3D; }
        .seal-literature { color: #5E7253; }
        .seal-philosophy { color: #4A6274; }
        .seal-misc { color: #A67C52; }
        .card-title-area { flex: 1; }
        .category-title { font-family: 'Noto Serif SC', serif; font-size: 1.125rem; font-weight: 600; letter-spacing: 0.1em; margin-bottom: 0.375rem; }
        .category-desc { font-size: 0.85rem; color: #8B837B; line-height: 1.4; }
        .card-body { flex: 1; }
        .category-stats { font-size: 0.75rem; color: #AB9F96; margin-bottom: 0.75rem; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .seal-tags { display: flex; flex-wrap: wrap; gap: 4px; }
        .seal-tag { font-family: 'Noto Serif SC', serif; font-size: 0.675rem; padding: 2px 6px; border: 1px solid; border-radius: 2px; }
        .enter-btn { font-family: 'Noto Serif SC', serif; font-size: 0.75rem; padding: 0.25rem 0.75rem; border: 1px solid; color: currentColor; text-decoration: none; border-radius: 3px; transition: all 0.2s; flex-shrink: 0; }
        .enter-btn:hover { background: currentColor; color: #FBF7F0; }
        @media (max-width: 600px) {
            .site-title { font-size: 1.75rem; letter-spacing: 0.2em; }
            .category-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
