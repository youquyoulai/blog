{{ define "main" }}
{{ partial "breadcrumbs.html" . }}

<div class="article">
<h1 class="post-title">{{ .Title }}</h1>
<div class="tagcloud">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" style="font-size: {{ mul .Weight 2 | add 12 }}px;" title="{{ .Data.Term }} - {{ len .Data.Pages }} 篇文章">
        {{ .Data.Term }} ({{ len .Data.Pages }})
    </a>
    {{ end }}
</div>
</div>
{{ end }}
