{{ define "main" }}
{{ partial "breadcrumbs.html" . }}

<!-- 先显示统计栏骨架 -->
<div id="wenhui-stats" class="wenhui-stats"></div>

<div id="wenhui-container">
    <!-- 骨架屏占位 -->
    <div class="wenhui-grid" id="wenhui-skeleton">
        <div class="wenhui-card wenhui-skeleton-card"><div class="skeleton-title"></div><div class="skeleton-desc"></div><div class="skeleton-meta"></div></div>
        <div class="wenhui-card wenhui-skeleton-card"><div class="skeleton-title"></div><div class="skeleton-desc"></div><div class="skeleton-meta"></div></div>
        <div class="wenhui-card wenhui-skeleton-card"><div class="skeleton-title"></div><div class="skeleton-desc"></div><div class="skeleton-meta"></div></div>
    </div>
</div>

<!-- 分页 -->
<div id="wenhui-pagination" class="wenhui-pagination" style="display:none;"></div>


<script>
(function(){
    var PAGE_SIZE = 12;
    var container = document.getElementById('wenhui-container');
    var statsEl = document.getElementById('wenhui-stats');
    var pagination = document.getElementById('wenhui-pagination');
    var skeleton = document.getElementById('wenhui-skeleton');

    function getPage() {
        var p = parseInt(new URLSearchParams(location.search).get('page') || '1', 10);
        return isNaN(p) || p < 1 ? 1 : p;
    }

    function renderEmpty(msg) {
        container.innerHTML = '<div class="wenhui-empty"><span class="wenhui-empty-icon">📭</span><p>' + (msg || '暂无内容') + '</p></div>';
        if (statsEl) statsEl.style.display = 'none';
    }

    function escHtml(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(d) {
        if (!d) return '';
        try {
            var date = new Date(d);
            if (isNaN(date.getTime())) return '';
            return date.getFullYear() + '-' +
                String(date.getMonth() + 1).padStart(2, '0') + '-' +
                String(date.getDate()).padStart(2, '0');
        } catch(e) { return ''; }
    }

    function renderCards(articles, page) {
        var totalPages = Math.ceil(articles.length / PAGE_SIZE);
        var start = (page - 1) * PAGE_SIZE;
        var end = start + PAGE_SIZE;
        var pageItems = articles.slice(start, end);

        var statsHtml = '共 <strong>' + articles.length + '</strong> 篇' +
            (articles.length > PAGE_SIZE ? '，第 <strong>' + page + '</strong> / <strong>' + totalPages + '</strong> 页' : '');
        if (statsEl) statsEl.innerHTML = statsHtml;

        var cardsHtml = '<div class="wenhui-grid">';
        for (var i = 0; i < pageItems.length; i++) {
            var a = pageItems[i];
            var dateStr = formatDate(a.pubDate);
            cardsHtml += '<div class="wenhui-card">' +
                '<div class="wenhui-card-title"><a href="' + escHtml(a.link) + '" target="_blank" rel="noopener">' + escHtml(a.title) + '</a></div>' +
                (a.desc ? '<div class="wenhui-card-desc">' + escHtml(a.desc) + '</div>' : '<div class="wenhui-card-desc" style="color:#ccc;">无摘要</div>') +
                '<div class="wenhui-card-meta">' +
                    '<div class="wenhui-card-source">来自 <a href="' + escHtml(a.sourceUrl || '#') + '" target="_blank" rel="noopener">' + escHtml(a.source) + '</a></div>' +
                    (dateStr ? '<div class="wenhui-card-date">' + escHtml(dateStr) + '</div>' : '') +
                '</div>' +
            '</div>';
        }
        cardsHtml += '</div>';
        container.innerHTML = cardsHtml;

        if (totalPages <= 1) {
            pagination.style.display = 'none';
            return;
        }
        pagination.style.display = 'flex';
        var prevDisabled = page <= 1 ? ' disabled' : '';
        var nextDisabled = page >= totalPages ? ' disabled' : '';

        var html = '<button' + prevDisabled + ' onclick="wenhuiGo(' + (page - 1) + ')">&larr; 上一页</button>';

        var maxPages = 7;
        var half = Math.floor(maxPages / 2);
        var startP = Math.max(1, page - half);
        var endP = Math.min(totalPages, startP + maxPages - 1);
        if (endP - startP < maxPages - 1) startP = Math.max(1, endP - maxPages + 1);

        if (startP > 1) {
            html += '<button onclick="wenhuiGo(1)">1</button>';
            if (startP > 2) html += '<span class="page-info">&hellip;</span>';
        }
        for (var p = startP; p <= endP; p++) {
            var active = p === page ? ' class="active"' : '';
            html += '<button' + active + ' onclick="wenhuiGo(' + p + ')">' + p + '</button>';
        }
        if (endP < totalPages) {
            if (endP < totalPages - 1) html += '<span class="page-info">&hellip;</span>';
            html += '<button onclick="wenhuiGo(' + totalPages + ')">' + totalPages + '</button>';
        }

        html += '<button' + nextDisabled + ' onclick="wenhuiGo(' + (page + 1) + ')">下一页 &rarr;</button>';
        pagination.innerHTML = html;
    }

    window.wenhuiGo = function(p) {
        var url = location.pathname;
        if (p > 1) url += '?page=' + p;
        history.pushState({}, '', url);
        var articles = window._wenhuiArticles || [];
        renderCards(articles, p);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.addEventListener('popstate', function() {
        var page = getPage();
        var articles = window._wenhuiArticles || [];
        renderCards(articles, page);
    });

    fetch('/feeds/wenhui.json')
        .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function(data) {
            var articles = data.articles || [];
            window._wenhuiArticles = articles;

            if (skeleton) skeleton.style.display = 'none';

            if (articles.length === 0) {
                renderEmpty('暂无内容，请先在后台添加 RSS 源');
                statsEl.style.display = 'none';
                pagination.style.display = 'none';
                return;
            }

            var page = getPage();
            renderCards(articles, page);
        })
        .catch(function(e) {
            console.error('文汇加载失败:', e);
            renderEmpty('加载失败，请稍后重试');
            pagination.style.display = 'none';
        });
})();
</script>
{{ end }}
