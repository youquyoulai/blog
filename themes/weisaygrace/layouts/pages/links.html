{{ define "main" }}
{{ partial "breadcrumbs.html" . }}

<!-- 先显示统计栏骨架 -->
<div id="wenhui-stats" class="wenhui-stats"></div>

<div id="wenhui-container">
    <!-- 骨架屏占位 -->
    <div class="wenhui-grid" id="wenhui-skeleton">
        <div class="wenhui-card wenhui-skeleton-card"><div class="skeleton-title"></div><div class="skeleton-desc"></div><div class="skeleton-meta"></div></div>
        <div class="wenhui-card wenhui-skeleton-card"><div class="skeleton-title"></div><div class="skeleton-desc"></div><div class="skeleton-meta"></div></div>
        <div class="wenhui-card wenhui-skeleton-card"><div class="skeleton-title"></div><div class="skeleton-desc"></div><div class="skeleton-meta"></div></div>
    </div>
</div>

<!-- 分页 -->
<div id="wenhui-pagination" class="wenhui-pagination" style="display:none;"></div>

<style>
.wenhui-empty { text-align: center; padding: 60px 20px; color: #888; }
.wenhui-empty-icon { font-size: 3rem; margin-bottom: 16px; display: block; }
.wenhui-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 20px; }
.wenhui-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; transition: box-shadow 0.2s, border-color 0.2s; }
.wenhui-card:hover { border-color: var(--color_link, #ed5565); box-shadow: 0 4px 12px rgba(237,85,101,0.08); }
.wenhui-card-title { font-size: 0.95rem; font-weight: 600; line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.wenhui-card-title a { color: #333; text-decoration: none; transition: color 0.2s; }
.wenhui-card-title a:hover { color: var(--color_link, #ed5565); }
.wenhui-card-desc { font-size: 0.875rem; color: #888; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; flex: 1; }
.wenhui-card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #888; border-top: 1px solid #e5e5e5; padding-top: 10px; margin-top: auto; }
.wenhui-card-source { display: flex; align-items: center; gap: 4px; max-width: 60%; overflow: hidden; }
.wenhui-card-source a { color: var(--color_link, #ed5565); text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wenhui-card-source a:hover { text-decoration: underline; }
.wenhui-card-date { white-space: nowrap; flex-shrink: 0; }
.wenhui-stats { display: flex; gap: 16px; font-size: 0.875rem; color: #888; margin-bottom: 16px; padding: 10px 14px; background: rgba(237,85,101,0.05); border-radius: 8px; }
.wenhui-stats strong { color: var(--color_link, #ed5565); }
.wenhui-pagination { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 28px; padding-top: 20px; border-top: 1px solid #e5e5e5; }
.wenhui-pagination button { padding: 6px 14px; border: 1px solid #e5e5e5; background: #fff; border-radius: 6px; cursor: pointer; font-size: 0.85rem; color: #333; transition: all 0.2s; }
.wenhui-pagination button:hover:not(:disabled) { border-color: var(--color_link, #ed5565); color: var(--color_link, #ed5565); }
.wenhui-pagination button.active { background: var(--color_link, #ed5565); border-color: var(--color_link, #ed5565); color: #fff; }
.wenhui-pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
.wenhui-pagination .page-info { padding: 6px 12px; font-size: 0.875rem; color: #888; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.wenhui-skeleton-card { pointer-events: none; }
.skeleton-title { height: 20px; width: 85%; background: linear-gradient(90deg, #e8e8e8 25%, #f0f0f0 50%, #e8e8e8 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; margin-bottom: 10px; }
.skeleton-desc { height: 14px; width: 100%; background: linear-gradient(90deg, #ebebeb 25%, #f3f3f3 50%, #ebebeb 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; margin-bottom: 6px; }
.skeleton-meta { height: 12px; width: 60%; background: linear-gradient(90deg, #ebebeb 25%, #f3f3f3 50%, #ebebeb 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
@media (max-width: 640px) { .wenhui-grid { grid-template-columns: 1fr; } }
/* 暗色模式 */
[data-theme="dark"] .wenhui-card, .dark .wenhui-card { background: #1e1e2e; border-color: #333; }
[data-theme="dark"] .wenhui-card-title a, .dark .wenhui-card-title a { color: #eee; }
[data-theme="dark"] .wenhui-card-desc, .dark .wenhui-card-desc { color: #999; }
[data-theme="dark"] .wenhui-card-meta, .dark .wenhui-card-meta { color: #999; border-color: #333; }
[data-theme="dark"] .wenhui-pagination button, .dark .wenhui-pagination button { background: #2a2a3e; border-color: #444; color: #ccc; }
[data-theme="dark"] .wenhui-stats, .dark .wenhui-stats { background: rgba(237,85,101,0.1); color: #aaa; }
</style>

<script>
(function(){
    var PAGE_SIZE = 12;
    var container = document.getElementById('wenhui-container');
    var statsEl = document.getElementById('wenhui-stats');
    var pagination = document.getElementById('wenhui-pagination');
    var skeleton = document.getElementById('wenhui-skeleton');

    function getPage() {
        var p = parseInt(new URLSearchParams(location.search).get('page') || '1', 10);
        return isNaN(p) || p < 1 ? 1 : p;
    }

    function renderEmpty(msg) {
        container.innerHTML = '<div class="wenhui-empty"><span class="wenhui-empty-icon">📭</span><p>' + (msg || '暂无内容') + '</p></div>';
        if (statsEl) statsEl.style.display = 'none';
    }

    function escHtml(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(d) {
        if (!d) return '';
        try {
            var date = new Date(d);
            if (isNaN(date.getTime())) return '';
            return date.getFullYear() + '-' +
                String(date.getMonth() + 1).padStart(2, '0') + '-' +
                String(date.getDate()).padStart(2, '0');
        } catch(e) { return ''; }
    }

    function renderCards(articles, page) {
        var totalPages = Math.ceil(articles.length / PAGE_SIZE);
        var start = (page - 1) * PAGE_SIZE;
        var end = start + PAGE_SIZE;
        var pageItems = articles.slice(start, end);

        var statsHtml = '共 <strong>' + articles.length + '</strong> 篇' +
            (articles.length > PAGE_SIZE ? '，第 <strong>' + page + '</strong> / <strong>' + totalPages + '</strong> 页' : '');
        if (statsEl) statsEl.innerHTML = statsHtml;

        var cardsHtml = '<div class="wenhui-grid">';
        for (var i = 0; i < pageItems.length; i++) {
            var a = pageItems[i];
            var dateStr = formatDate(a.pubDate);
            cardsHtml += '<div class="wenhui-card">' +
                '<div class="wenhui-card-title"><a href="' + escHtml(a.link) + '" target="_blank" rel="noopener">' + escHtml(a.title) + '</a></div>' +
                (a.desc ? '<div class="wenhui-card-desc">' + escHtml(a.desc) + '</div>' : '<div class="wenhui-card-desc" style="color:#ccc;">无摘要</div>') +
                '<div class="wenhui-card-meta">' +
                    '<div class="wenhui-card-source">来自 <a href="' + escHtml(a.sourceUrl || '#') + '" target="_blank" rel="noopener">' + escHtml(a.source) + '</a></div>' +
                    (dateStr ? '<div class="wenhui-card-date">' + escHtml(dateStr) + '</div>' : '') +
                '</div>' +
            '</div>';
        }
        cardsHtml += '</div>';
        container.innerHTML = cardsHtml;

        if (totalPages <= 1) {
            pagination.style.display = 'none';
            return;
        }
        pagination.style.display = 'flex';
        var prevDisabled = page <= 1 ? ' disabled' : '';
        var nextDisabled = page >= totalPages ? ' disabled' : '';

        var html = '<button' + prevDisabled + ' onclick="wenhuiGo(' + (page - 1) + ')">&larr; 上一页</button>';

        var maxPages = 7;
        var half = Math.floor(maxPages / 2);
        var startP = Math.max(1, page - half);
        var endP = Math.min(totalPages, startP + maxPages - 1);
        if (endP - startP < maxPages - 1) startP = Math.max(1, endP - maxPages + 1);

        if (startP > 1) {
            html += '<button onclick="wenhuiGo(1)">1</button>';
            if (startP > 2) html += '<span class="page-info">&hellip;</span>';
        }
        for (var p = startP; p <= endP; p++) {
            var active = p === page ? ' class="active"' : '';
            html += '<button' + active + ' onclick="wenhuiGo(' + p + ')">' + p + '</button>';
        }
        if (endP < totalPages) {
            if (endP < totalPages - 1) html += '<span class="page-info">&hellip;</span>';
            html += '<button onclick="wenhuiGo(' + totalPages + ')">' + totalPages + '</button>';
        }

        html += '<button' + nextDisabled + ' onclick="wenhuiGo(' + (page + 1) + ')">下一页 &rarr;</button>';
        pagination.innerHTML = html;
    }

    window.wenhuiGo = function(p) {
        var url = location.pathname;
        if (p > 1) url += '?page=' + p;
        history.pushState({}, '', url);
        var articles = window._wenhuiArticles || [];
        renderCards(articles, p);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.addEventListener('popstate', function() {
        var page = getPage();
        var articles = window._wenhuiArticles || [];
        renderCards(articles, page);
    });

    fetch('/feeds/wenhui.json')
        .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function(data) {
            var articles = data.articles || [];
            window._wenhuiArticles = articles;

            if (skeleton) skeleton.style.display = 'none';

            if (articles.length === 0) {
                renderEmpty('暂无内容，请先在后台添加 RSS 源');
                statsEl.style.display = 'none';
                pagination.style.display = 'none';
                return;
            }

            var page = getPage();
            renderCards(articles, page);
        })
        .catch(function(e) {
            console.error('文汇加载失败:', e);
            renderEmpty('加载失败，请稍后重试');
            pagination.style.display = 'none';
        });
})();
</script>
{{ end }}
