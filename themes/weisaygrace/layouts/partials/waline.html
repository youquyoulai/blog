{{/* Waline 评论加载 - weisaygrace 主题专用 */}}
{{ $serverURL := .serverURL }}
<link rel="preload" as="style" href="https://unpkg.com/@waline/client@v2/dist/waline.css" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://unpkg.com/@waline/client@v2/dist/waline.css"></noscript>
<script src="https://unpkg.com/@waline/client@v2/dist/waline.js" defer></script>
<div id="{{ .el }}-wrap" class="comments-section" style="margin-top:1rem;">
    <div class="widget" style="background:#fff;border-radius:0.375rem;border-bottom:3px solid #e5e5e5;box-shadow:0 0 4px rgba(205, 220, 230, .5);">
        <h3 class="widget-title" style="height:2rem;line-height:2rem;background:#f5f7f8;padding:0.625rem 1rem;border-top-left-radius:0.375rem;border-top-right-radius:0.375rem;color:#3c454d;font-size:1.125rem;"><svg class="posticon" style="width:1em;height:1em;vertical-align:middle;"><use href="#icon-message"/></svg> {{ .label | default "评论" }}</h3>
        <div id="{{ .el }}" style="padding:1rem;">
            <div id="{{ .el }}-loading" class="waline-loading" style="display:flex;align-items:center;justify-content:center;padding:2rem;color:#999;">
                <svg style="width:1.5rem;height:1.5rem;animation:spin 1s linear infinite;margin-right:0.5rem;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                加载中...
            </div>
        </div>
    </div>
</div>
<script>
function initWaline() {
    const el = document.getElementById('{{ .el }}');
    const loading = document.getElementById('{{ .el }}-loading');
    Waline.init({
        el: '#{{ .el }}',
        serverURL: '{{ $serverURL }}',
        lang: 'zh-CN',
        path: '{{ .path }}',
        reaction: false,
        imageUploader: false,
        emoji: false,
        highlight: false,
        onInit: function() {
            if (loading) loading.style.display = 'none';
        }
    });
}
var walineObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
        if (entry.isIntersecting) {
            initWaline();
            walineObserver.disconnect();
        }
    });
}, { rootMargin: '200px' });
walineObserver.observe(document.getElementById('{{ .el }}-wrap'));
</script>
