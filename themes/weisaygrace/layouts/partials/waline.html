{{/* Waline 评论加载 - weisaygrace 主题专用 */}}
{{ $serverURL := .serverURL }}
<link rel="preload" as="style" href="https://unpkg.com/@waline/client@v2/dist/waline.css" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://unpkg.com/@waline/client@v2/dist/waline.css"></noscript>
<script src="https://unpkg.com/@waline/client@v2/dist/waline.js" defer></script>
<div id="{{ .el }}-wrap" class="comments-section">
    <div class="widget waline-widget">
        <h3 class="widget-title waline-widget-title"><svg class="posticon"><use href="#icon-message"/></svg> {{ .label | default "评论" }}</h3>
        <div id="{{ .el }}" class="waline-container">
            <div id="{{ .el }}-loading" class="waline-loading">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                加载中...
            </div>
        </div>
    </div>
</div>
<script>
function initWaline() {
    const el = document.getElementById('{{ .el }}');
    const loading = document.getElementById('{{ .el }}-loading');
    Waline.init({
        el: '#{{ .el }}',
        serverURL: '{{ $serverURL }}',
        lang: 'zh-CN',
        path: '{{ .path }}',
        reaction: false,
        imageUploader: false,
        emoji: false,
        highlight: false,
        onInit: function() {
            if (loading) loading.style.display = 'none';
        }
    });
}
var walineObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
        if (entry.isIntersecting) {
            initWaline();
            walineObserver.disconnect();
        }
    });
}, { rootMargin: '200px' });
walineObserver.observe(document.getElementById('{{ .el }}-wrap'));
setTimeout(function() {
    if (typeof Waline !== 'undefined') {
        const el = document.getElementById('{{ .el }}-loading');
        if (el && el.style.display !== 'none') {
            initWaline();
        }
    }
}, 2000);
</script>
