{{ define "main" }}
<div class="article search-page">
{{ partial "breadcrumbs.html" . }}
<div class="search-form-wrapper">
    <form class="search-form" method="get" action="{{ .Site.BaseURL }}search">
        <input class="search-input" required="" value="{{ .Params.s }}" type="text" name="s" placeholder="иҫ“е…Ҙе…ій”®иҜҚжҗңзҙў" />
        <button aria-label="жҗңзҙў" class="search-submit" type="submit"><svg class="posticon"><use href="#icon-search"/></svg></button>
    </form>
</div>

<div id="search-results"><p class="search-loading">жҗңзҙўдёӯ...</p></div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var query = (params.get('s') || '').trim();
  var container = document.getElementById('search-results');

  if (!query) {
    container.innerHTML = '<p class="search-empty">иҜ·иҫ“е…Ҙжҗңзҙўе…ій”®иҜҚ</p>';
    return;
  }

  function toArray(val) {
    if (Array.isArray(val)) return val;
    if (typeof val === 'string' && val.trim()) return [val.trim()];
    return [];
  }

  function truncate(str, len) {
    var plain = str.replace(/<[^>]*>/g, '');
    return plain.length > len ? plain.substring(0, len) + '...' : plain;
  }

  function highlight(text, q) {
    if (!q) return text;
    var regex = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return text.replace(regex, '<mark>$1</mark>');
  }

  var jsonUrl = '{{ "searchindex.json" | relURL }}';
  fetch(jsonUrl)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      var results = [];
      var q = query.toLowerCase();
      for (var i = 0; i < data.length; i++) {
        var post = data[i];
        var tags = toArray(post.tags);
        var categories = toArray(post.categories);
        var text = (post.title + ' ' + post.summary + ' ' + tags.join(' ') + ' ' + categories.join(' ')).toLowerCase();
        if (text.indexOf(q) !== -1) {
          results.push(post);
        }
      }

      if (results.length === 0) {
        container.innerHTML = '<p class="search-empty">жІЎжңүжүҫеҲ°дёҺ "' + query + '" зӣёе…ізҡ„ж–Үз« </p>';
        return;
      }

      var html = '<p class="search-count">жүҫеҲ° ' + results.length + ' зҜҮзӣёе…іж–Үз« </p>';
      for (var j = 0; j < results.length; j++) {
        var r = results[j];
        var catArray = toArray(r.categories);
        html += '<div class="search-result-item">';
        html += '<a href="' + r.url + '" class="search-result-title">' + highlight(r.title, query) + '</a>';
        if (r.summary) {
          html += '<p class="search-result-summary">' + highlight(truncate(r.summary, 150), query) + '</p>';
        }
        html += '<span class="search-result-meta">' + (catArray.join(', ') || 'жңӘеҲҶзұ»') + ' В· ' + r.date + '</span>';
        html += '</div>';
      }
      container.innerHTML = html;
    })
    .catch(function(err) {
      console.error('жҗңзҙўеӨұиҙҘ:', err);
      container.innerHTML = '<p class="search-empty">жҗңзҙўеӨұиҙҘпјҢиҜ·зЁҚеҗҺйҮҚиҜ•</p>';
    });
})();
</script>
{{ end }}
