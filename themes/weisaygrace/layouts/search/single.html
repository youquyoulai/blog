{{ define "main" }}
<div class="article search-page" style="padding: 0 .625rem !important;">
{{ partial "breadcrumbs.html" . }}
<div class="search-form-wrapper">
    <form class="search-form" method="get" action="{{ .Site.BaseURL }}search">
        <input class="search-input" required="" value="{{ .Params.s }}" type="text" name="s" placeholder="输入关键词搜索" />
        <button aria-label="搜索" class="search-submit" type="submit"><svg class="icon-search" style="width:1em;height:1em;"><use href="#icon-search"/></svg></button>
    </form>
</div>

<div id="search-results"><p class="search-loading">搜索中...</p></div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var query = (params.get('s') || '').trim();
  var container = document.getElementById('search-results');

  if (!query) {
    container.innerHTML = '<p class="search-empty">请输入搜索关键词</p>';
    return;
  }

  function toArray(val) {
    if (Array.isArray(val)) return val;
    if (typeof val === 'string' && val.trim()) return [val.trim()];
    return [];
  }

  function truncate(str, len) {
    var plain = str.replace(/<[^>]*>/g, '');
    return plain.length > len ? plain.substring(0, len) + '...' : plain;
  }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function highlight(text, q) {
    if (!q) return text;
    var regex = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return text.replace(regex, '<mark>$1</mark>');
  }

  var jsonUrl = '{{ "searchindex.json" | relURL }}';
  fetch(jsonUrl)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      var results = [];
      var q = query.toLowerCase();
      for (var i = 0; i < data.length; i++) {
        var post = data[i];
        var tags = toArray(post.tags);
        var categories = toArray(post.categories);
        var text = (post.title + ' ' + post.summary + ' ' + tags.join(' ') + ' ' + categories.join(' ')).toLowerCase();
        if (text.indexOf(q) !== -1) {
          results.push(post);
        }
      }

      if (results.length === 0) {
        container.innerHTML = '<p class="search-empty">没有找到与 "' + escapeHtml(query) + '" 相关的文章</p>';
        return;
      }

      var html = '<p class="search-count" style="display: block !important; color: #666 !important; font-size: .875rem !important; margin: 0 0 1rem 0 !important; padding: .625rem .875rem !important; background: #fff !important; border-radius: .375rem !important; border-bottom: 3px solid #e5e5e5 !important; box-shadow: 0 0 4px rgba(205,220,230,.5) !important;">找到 ' + results.length + ' 篇相关文章</p>';
      for (var j = 0; j < results.length; j++) {
        var r = results[j];
        var catArray = toArray(r.categories);
        html += '<div class="search-result-item">';
        html += '<a href="' + escapeHtml(r.url) + '" class="search-result-title">' + escapeHtml(highlight(r.title, query)) + '</a>';
        if (r.summary) {
          html += '<p class="search-result-summary">' + highlight(truncate(r.summary, 150), query) + '</p>';
        }
        html += '<span class="search-result-meta">' + (catArray.join(', ') || '未分类') + ' · ' + r.date + '</span>';
        html += '</div>';
      }
      container.innerHTML = html;
    })
    .catch(function(err) {
      console.error('搜索失败:', err);
      container.innerHTML = '<p class="search-empty">搜索失败，请稍后重试</p>';
    });
})();
</script>
{{ end }}
