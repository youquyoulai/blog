{{ define "main" }}
<div class="container">
    <div class="main-content">
        <div class="breadcrumbs">
            <a href="{{ .Site.BaseURL }}">首页</a> > <span>搜索</span>
        </div>
        <div class="search-results-page">
            <h1 class="page-title">搜索结果</h1>
            <div class="search-results-header">
                <form method="get" action="/search" class="search-form" role="search">
                    <input type="text" id="searchPageInput" name="s" placeholder="{{ .Params.placeholder | default "搜索文章、标签..." }}">
                    <button type="submit" aria-label="搜索">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    </button>
                </form>
            </div>
            <div id="searchResults" class="search-results-list">
                <p class="search-loading">搜索中...</p>
            </div>
        </div>
    </div>
</div>
{{ end }}
